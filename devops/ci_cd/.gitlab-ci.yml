# ============================
# WOLLOYEWA STORE BOT - GITLAB CI/CD PIPELINE
# ============================

stages:
  - build
  - test
  - security
  - package
  - deploy
  - monitor

variables:
  DOCKER_REGISTRY: registry.gitlab.com
  DOCKER_IMAGE_NAME: $CI_REGISTRY_IMAGE
  POSTGRES_USER: test_user
  POSTGRES_PASSWORD: test_pass
  POSTGRES_DB: test_db
  PYTHON_VERSION: "3.11"

cache:
  paths:
    - .venv/
    - .cache/pip

# ============================
# Build Stage
# ============================

build:
  stage: build
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - python -m venv .venv
    - source .venv/bin/activate
    - pip install --upgrade pip
  script:
    - pip install -r requirements.txt
    - python -c "import main; print('Build successful')"
  artifacts:
    paths:
      - .venv/
    expire_in: 1 hour

# ============================
# Test Stage
# ============================

unit-tests:
  stage: test
  image: python:${PYTHON_VERSION}-slim
  services:
    - postgres:15-alpine
    - redis:7-alpine
  variables:
    DATABASE_URL: postgresql://test_user:test_pass@postgres:5432/test_db
    REDIS_URL: redis://redis:6379/0
    ENVIRONMENT: testing
  before_script:
    - apt-get update && apt-get install -y postgresql-client
    - python -m venv .venv
    - source .venv/bin/activate
    - pip install -r requirements-dev.txt
  script:
    - alembic upgrade head
    - pytest --cov=. --cov-report=xml --cov-report=term -v
  coverage: '/TOTAL.+ ([0-9]{1,3}%)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
      - htmlcov/

integration-tests:
  stage: test
  image: python:${PYTHON_VERSION}-slim
  services:
    - postgres:15-alpine
    - redis:7-alpine
  variables:
    DATABASE_URL: postgresql://test_user:test_pass@postgres:5432/test_db
    REDIS_URL: redis://redis:6379/0
    ENVIRONMENT: testing
  before_script:
    - python -m venv .venv
    - source .venv/bin/activate
    - pip install -r requirements-dev.txt
  script:
    - alembic upgrade head
    - pytest -m integration -v
  needs:
    - unit-tests

# ============================
# Security Stage
# ============================

security-sast:
  stage: security
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - pip install bandit safety
  script:
    - bandit -r . -ll -f json -o bandit.json || true
    - safety check -r requirements.txt --json > safety.json || true
  artifacts:
    paths:
      - bandit.json
      - safety.json
    expire_in: 1 week

security-dependency-scan:
  stage: security
  image: aquasec/trivy:latest
  script:
    - trivy fs --security-checks vuln --severity HIGH,CRITICAL --format json -o trivy.json .
  artifacts:
    paths:
      - trivy.json
    expire_in: 1 week

security-container-scan:
  stage: security
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker build -t $DOCKER_IMAGE_NAME:latest .
  script:
    - docker run --rm aquasec/trivy image --severity HIGH,CRITICAL --format json --output trivy-container.json $DOCKER_IMAGE_NAME:latest
  artifacts:
    paths:
      - trivy-container.json
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ============================
# Package Stage
# ============================

docker-build:
  stage: package
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      if [[ "$CI_COMMIT_BRANCH" == "$CI_DEFAULT_BRANCH" ]]; then
        TAG="latest"
      else
        TAG="$CI_COMMIT_REF_SLUG"
      fi
    - docker build --target production -t $DOCKER_IMAGE_NAME:$TAG .
    - docker push $DOCKER_IMAGE_NAME:$TAG
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_MERGE_REQUEST_ID

# ============================
# Deploy Stage
# ============================

deploy-staging:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - curl -X POST -F "token=$CI_JOB_TOKEN" -F "ref=main" $CI_API_V4_URL/projects/$CI_PROJECT_ID/trigger/pipeline
  environment:
    name: staging
    url: https://staging.wolloyewa.com
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"

deploy-production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - |
      if curl -s "https://api.wolloyewa.com/health" | grep -q "healthy"; then
        echo "Health check passed, proceeding with deployment"
      else
        echo "Health check failed, aborting deployment"
        exit 1
      fi
    - curl -X POST -F "token=$CI_JOB_TOKEN" -F "ref=main" $CI_API_V4_URL/projects/$CI_PROJECT_ID/trigger/pipeline?deploy=true
  environment:
    name: production
    url: https://wolloyewa.com
  rules:
    - if: $CI_COMMIT_TAG
  when: manual

# ============================
# Monitor Stage
# ============================

synthetic-monitoring:
  stage: monitor
  image: alpine/curl:latest
  script:
    - |
      for endpoint in /health /api/v1/health /metrics; do
        curl -f "https://api.wolloyewa.com${endpoint}" || exit 1
      done
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  when: delayed
  start_in: 10 minutes

# ============================
# Rollback
# ============================

rollback:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Rolling back to previous version..."
    - curl -X POST -F "token=$CI_JOB_TOKEN" -F "ref=main" $CI_API_V4_URL/projects/$CI_PROJECT_ID/trigger/pipeline?rollback=true
  environment:
    name: production
    action: rollback
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  when: manual