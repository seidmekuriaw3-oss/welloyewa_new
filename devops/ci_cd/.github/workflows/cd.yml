name: CD - Continuous Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  DOCKER_IMAGE_NAME: wolloyewa/app
  AWS_REGION: eu-north-1
  ECR_REPOSITORY: wolloyewa

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
      
      - name: Build and tag Docker image
        run: |
          COMMIT_HASH=$(echo ${{ github.sha }} | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          IMAGE_TAG="${COMMIT_HASH}-${TIMESTAMP}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
          
          docker build -t ${{ env.ECR_REPOSITORY }}:$IMAGE_TAG -t ${{ env.ECR_REPOSITORY }}:latest .
          docker tag ${{ env.ECR_REPOSITORY }}:$IMAGE_TAG ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          docker tag ${{ env.ECR_REPOSITORY }}:latest ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
      
      - name: Push Docker image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
      
      - name: Update ECS service
        run: |
          aws ecs update-service --cluster wolloyewa-staging --service app --force-new-deployment
      
      - name: Wait for deployment to stabilize
        run: |
          aws ecs wait services-stable --cluster wolloyewa-staging --services app
      
      - name: Run database migrations
        run: |
          TASK_ARN=$(aws ecs run-task --cluster wolloyewa-staging --task-definition wolloyewa-migrate --overrides '{"containerOverrides":[{"name":"migrate","command":["alembic","upgrade","head"]}]}' --query 'tasks[0].taskArn' --output text)
          aws ecs wait tasks-stopped --cluster wolloyewa-staging --tasks $TASK_ARN
      
      - name: Run smoke tests
        run: |
          curl -f https://staging-api.wolloyewa.com/health || exit 1
          curl -f https://staging.wolloyewa.com || exit 1
      
      - name: Notify deployment status
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ Staging Deployment Complete!
            Image: ${{ env.IMAGE_TAG }}
            Environment: Staging
            Status: Success

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
      
      - name: Build production image
        run: |
          COMMIT_HASH=$(echo ${{ github.sha }} | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          IMAGE_TAG="${COMMIT_HASH}-${TIMESTAMP}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
          
          docker build --target production -t ${{ env.ECR_REPOSITORY }}:$IMAGE_TAG .
          docker tag ${{ env.ECR_REPOSITORY }}:$IMAGE_TAG ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
      
      - name: Push to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
      
      - name: Update ECS service (blue/green)
        run: |
          aws deploy create-deployment \
            --application-name wolloyewa \
            --deployment-group-name production \
            --image-revision ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
      
      - name: Run database migrations (maintenance mode)
        run: |
          aws ecs run-task --cluster wolloyewa-production --task-definition wolloyewa-migrate --overrides '{"containerOverrides":[{"name":"migrate","command":["alembic","upgrade","head"]}]}'
      
      - name: Verify deployment
        run: |
          sleep 60
          curl -f https://api.wolloyewa.com/health || exit 1
          curl -f https://wolloyewa.com || exit 1
      
      - name: Create deployment tag
        run: |
          git tag "deploy-${{ env.IMAGE_TAG }}"
          git push origin "deploy-${{ env.IMAGE_TAG }}"
      
      - name: Notify deployment success
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🚀 Production Deployment Successful!
            Version: ${{ env.IMAGE_TAG }}
            Deployed by: ${{ github.actor }}
            Commit: ${{ github.sha }}
            Time: $(date)
      
      - name: Slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: always()

  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    environment: production
    if: failure()
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Get previous stable version
        run: |
          PREVIOUS_TAG=$(aws ecs describe-services --cluster wolloyewa-production --services app --query 'services[0].deployments[?status=="PRIMARY"].taskDefinition' --output text | cut -d':' -f2)
          echo "PREVIOUS_TAG=${PREVIOUS_TAG}" >> $GITHUB_ENV
      
      - name: Rollback ECS service
        run: |
          aws ecs update-service --cluster wolloyewa-production --service app --task-definition wolloyewa:${PREVIOUS_TAG}
      
      - name: Notify rollback
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🔴 Production Rollback Executed!
            Previous version: ${{ env.PREVIOUS_TAG }}
            Reason: Deployment failure