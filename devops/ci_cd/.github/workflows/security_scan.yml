name: Security Scan

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.11'

jobs:
  sast:
    name: Static Application Security Testing
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety pylint
      
      - name: Run Bandit
        run: |
          bandit -r . -f json -o bandit_report.json -ll
      
      - name: Upload Bandit report
        uses: actions/upload-artifact@v3
        with:
          name: bandit-report
          path: bandit_report.json
      
      - name: Run Safety Check
        run: |
          safety check -r requirements.txt --json > safety_report.json
      
      - name: Upload Safety report
        uses: actions/upload-artifact@v3
        with:
          name: safety-report
          path: safety_report.json

  dast:
    name: Dynamic Application Security Testing
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Start application
        run: |
          docker-compose -f docker-compose.yml up -d
          sleep 30
      
      - name: Run OWASP ZAP scan
        uses: zaproxy/action-full-scan@v0.8.0
        with:
          target: 'http://localhost:8000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j'
      
      - name: Upload ZAP report
        uses: actions/upload-artifact@v3
        with:
          name: zap-report
          path: /home/runner/work/_temp/zap.out

  dependency-check:
    name: Dependency Vulnerability Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: Check Python dependencies
        run: |
          pip install pip-audit
          pip-audit --requirement requirements.txt --format json > pip-audit.json
      
      - name: Upload pip-audit report
        uses: actions/upload-artifact@v3
        with:
          name: pip-audit-report
          path: pip-audit.json

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --json --only-verified
      
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Run detect-secrets
        run: |
          pip install detect-secrets
          detect-secrets scan --baseline .secrets.baseline
          detect-secrets audit .secrets.baseline

  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build Docker image
        run: |
          docker build -t wolloyewa/app:scan .
      
      - name: Run Trivy on Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'wolloyewa/app:scan'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
      
      - name: Upload Trivy image results
        uses: actions/upload-artifact@v3
        with:
          name: trivy-image-results
          path: trivy-image-results.sarif
      
      - name: Run Docker Scout
        uses: docker/scout-action@v1
        with:
          command: quickview
          image: wolloyewa/app:scan
          only-severities: critical,high

  report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs: [sast, dast, dependency-check, secret-scan, container-scan]
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: ./reports
      
      - name: Generate summary report
        run: |
          echo "# Security Scan Report" > security_report.md
          echo "" >> security_report.md
          echo "## Scan Date: $(date)" >> security_report.md
          echo "" >> security_report.md
          
          echo "### SAST Results" >> security_report.md
          if [ -f ./reports/bandit-report/bandit_report.json ]; then
            echo "- Bandit scan completed" >> security_report.md
          fi
          
          echo "### Dependency Check Results" >> security_report.md
          if [ -f ./reports/pip-audit-report/pip-audit.json ]; then
            echo "- pip-audit scan completed" >> security_report.md
          fi
          
          echo "### Container Scan Results" >> security_report.md
          if [ -f ./reports/trivy-image-results/trivy-image-results.sarif ]; then
            echo "- Trivy container scan completed" >> security_report.md
          fi
      
      - name: Upload security report
        uses: actions/upload-artifact@v3
        with:
          name: security-report
          path: security_report.md
      
      - name: Notify security team
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.SECURITY_TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🚨 Security vulnerabilities detected!
            Repository: ${{ github.repository }}
            Run: ${{ github.run_id }}
            Please review the security scan reports.