# ============================
# WOLLOYEWA STORE BOT - NGINX CONFIGURATION
# ============================

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" uht="$upstream_header_time" urt="$upstream_response_time"';
    
    log_format json escape=json '{'
        '"time_local":"$time_local",'
        '"remote_addr":"$remote_addr",'
        '"remote_user":"$remote_user",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_response_time":"$upstream_response_time"'
    '}';

    access_log /var/log/nginx/access.log json;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 8k;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml image/svg+xml;
    gzip_disable "msie6";

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Rate Limiting Zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=payment_limit:10m rate=30r/m;

    # Upstream Servers
    upstream api_backend {
        least_conn;
        server api-1.wolloyewa.com:8000 max_fails=3 fail_timeout=30s;
        server api-2.wolloyewa.com:8000 max_fails=3 fail_timeout=30s;
        server api-3.wolloyewa.com:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream bot_backend {
        least_conn;
        server bot-1.wolloyewa.com:8000 max_fails=3 fail_timeout=30s;
        server bot-2.wolloyewa.com:8000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream websocket_backend {
        least_conn;
        server websocket-1.wolloyewa.com:8001;
        server websocket-2.wolloyewa.com:8001;
    }

    # HTTP to HTTPS Redirect
    server {
        listen 80;
        listen [::]:80;
        server_name wolloyewa.com api.wolloyewa.com admin.wolloyewa.com;
        return 301 https://$server_name$request_uri;
    }

    # Main API Server
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name api.wolloyewa.com;

        # SSL Configuration
        ssl_certificate /etc/nginx/ssl/wolloyewa.crt;
        ssl_certificate_key /etc/nginx/ssl/wolloyewa.key;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/nginx/ssl/ca.crt;

        # Rate Limiting
        limit_req zone=api_limit burst=20 nodelay;

        location / {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache_bypass $http_upgrade;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /health {
            proxy_pass http://api_backend;
            access_log off;
            proxy_cache_valid 200 5s;
        }

        location /metrics {
            proxy_pass http://api_backend;
            access_log off;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            deny all;
        }
    }

    # WebSocket Server
    server {
        listen 443 ssl http2;
        server_name ws.wolloyewa.com;

        ssl_certificate /etc/nginx/ssl/wolloyewa.crt;
        ssl_certificate_key /etc/nginx/ssl/wolloyewa.key;

        location / {
            proxy_pass http://websocket_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }
    }

    # Main Website
    server {
        listen 443 ssl http2;
        server_name wolloyewa.com;

        ssl_certificate /etc/nginx/ssl/wolloyewa.crt;
        ssl_certificate_key /etc/nginx/ssl/wolloyewa.key;

        root /var/www/wolloyewa;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public, immutable";
        }

        location /static/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Admin Panel
    server {
        listen 443 ssl http2;
        server_name admin.wolloyewa.com;

        ssl_certificate /etc/nginx/ssl/wolloyewa.crt;
        ssl_certificate_key /etc/nginx/ssl/wolloyewa.key;

        # Basic Authentication
        auth_basic "Admin Area";
        auth_basic_user_file /etc/nginx/.htpasswd;

        location / {
            proxy_pass http://api_backend/admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Stricter rate limiting for admin
        limit_req zone=login_limit burst=5 nodelay;
    }

    # CDN / Static Files
    server {
        listen 443 ssl http2;
        server_name cdn.wolloyewa.com;

        ssl_certificate /etc/nginx/ssl/wolloyewa.crt;
        ssl_certificate_key /etc/nginx/ssl/wolloyewa.key;

        root /var/www/cdn;
        expires 1y;
        add_header Cache-Control "public, immutable";

        location ~* \.(jpg|jpeg|png|gif|ico|webp|svg|css|js|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}