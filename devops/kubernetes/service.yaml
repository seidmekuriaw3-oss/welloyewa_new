apiVersion: v1
kind: Service
metadata:
  name: wolloyewa-app-service
  namespace: wolloyewa
  labels:
    app: wolloyewa
    component: api
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: wolloyewa
    component: api
---
apiVersion: v1
kind: Service
metadata:
  name: wolloyewa-app-external
  namespace: wolloyewa
  labels:
    app: wolloyewa
    component: api
    type: external
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
    - port: 443
      targetPort: 8000
      protocol: TCP
      name: https
  selector:
    app: wolloyewa
    component: api
---
apiVersion: v1
kind: Service
metadata:
  name: wolloyewa-redis
  namespace: wolloyewa
