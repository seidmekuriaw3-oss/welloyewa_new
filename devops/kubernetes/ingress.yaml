apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wolloyewa-ingress
  namespace: wolloyewa
  labels:
    app: wolloyewa
    component: ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-whitelist: "192.168.0.0/16"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://wolloyewa.com,https://api.wolloyewa.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type"
spec:
  tls:
    - hosts:
        - api.wolloyewa.com
        - wolloyewa.com
        - admin.wolloyewa.com
      secretName: wolloyewa-tls
  rules:
    - host: api.wolloyewa.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wolloyewa-app-service
                port:
                  number: 8000
    - host: wolloyewa.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wolloyewa-web-service
                port:
                  number: 80
    - host: admin.wolloyewa.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wolloyewa-admin-service
                port:
                  number: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wolloyewa-monitoring-ingress
  namespace: monitoring
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: monitoring-auth
    nginx.ingress.kubernetes.io/auth-realm: 'Authentication Required'
spec:
  tls:
    - hosts:
        - monitoring.wolloyewa.com
      secretName: monitoring-tls
  rules:
    - host: monitoring.wolloyewa.com
      http:
        paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
          - path: /prometheus
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  number: 9090
          - path: /flower
            pathType: Prefix
            backend:
              service:
                name: wolloyewa-celery-worker
                port:
                  number: 5555